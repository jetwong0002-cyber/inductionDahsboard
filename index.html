<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LONGMOTIVE Dashboards</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f4f8fd;
    --panel: #ffffff;
    --text: #0b1f3a;
    --muted: #4a6078;
    --line: #d4e2f2;
    --navy: #0b3d82;
    --sky: #5bb6f0;
    --primary: #0b3d82;
    --primary-strong: #08306a;
    --primary-soft: #e8f3fc;
    --accent: #5bb6f0;
    --danger: #b91c1c;
    --shadow: 0 16px 40px rgba(11, 61, 130, 0.1);
    --font-display: "Space Grotesk", sans-serif;
    --font-body: "Manrope", ui-sans-serif, system-ui, sans-serif;
    --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--bg);
  }
  button, input { font: inherit; }
  .hidden { display: none !important; }

  /* —— Login —— */
  .login {
    position: fixed;
    inset: 0;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1.15fr 0.85fr;
    background: #ffffff;
    overflow: hidden;
  }
  .login-hero {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(32px, 6vw, 72px);
    background:
      radial-gradient(ellipse 70% 55% at 18% 22%, rgba(91, 182, 240, 0.22), transparent 58%),
      radial-gradient(ellipse 55% 50% at 88% 78%, rgba(11, 61, 130, 0.1), transparent 55%),
      linear-gradient(160deg, #ffffff 0%, #f3f8fd 48%, #eaf3fb 100%);
    overflow: hidden;
  }
  .login-hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(11, 61, 130, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(11, 61, 130, 0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 70% at 40% 45%, #000 20%, transparent 75%);
    pointer-events: none;
  }
  .login-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(2px);
    pointer-events: none;
    animation: orbFloat 10s ease-in-out infinite;
  }
  .login-orb-a {
    width: 220px;
    height: 220px;
    top: -40px;
    right: 8%;
    background: rgba(91, 182, 240, 0.18);
  }
  .login-orb-b {
    width: 160px;
    height: 160px;
    bottom: 12%;
    left: 6%;
    background: rgba(11, 61, 130, 0.1);
    animation-delay: -4s;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-12px, 14px); }
  }
  .login-brand-mark {
    position: relative;
    z-index: 1;
    width: min(100%, 560px);
    animation: brandIn 0.85s var(--ease-spring) both;
  }
  .login-brand-mark svg {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 18px 36px rgba(11, 61, 130, 0.12));
  }
  .login-hero-copy {
    position: relative;
    z-index: 1;
    margin-top: clamp(20px, 3vw, 36px);
    max-width: 420px;
    animation: brandIn 0.85s var(--ease-spring) 0.12s both;
  }
  .login-hero-copy p {
    margin: 0;
    font-size: clamp(15px, 1.5vw, 17px);
    line-height: 1.55;
    color: var(--muted);
  }
  @keyframes brandIn {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: none; }
  }

  .login-panel {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(24px, 4vw, 48px);
    background: #ffffff;
    border-left: 1px solid var(--line);
  }
  .login-panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 100% 0%, rgba(91, 182, 240, 0.08), transparent 55%);
    pointer-events: none;
  }
  .login-card {
    width: min(400px, 100%);
    position: relative;
    z-index: 1;
    animation: panelIn 0.7s var(--ease-spring) 0.08s both;
  }
  @keyframes panelIn {
    from { opacity: 0; transform: translateX(18px); }
    to { opacity: 1; transform: none; }
  }
  .login-card-kicker {
    margin: 0 0 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--sky);
  }
  .login-card h1 {
    margin: 0 0 10px;
    font-family: var(--font-display);
    font-size: clamp(28px, 3vw, 34px);
    letter-spacing: -0.035em;
    font-weight: 600;
    color: var(--navy);
    line-height: 1.1;
  }
  .login-card > .login-sub {
    margin: 0 0 28px;
    font-size: 14.5px;
    color: var(--muted);
    line-height: 1.55;
  }
  .login-field { margin-bottom: 16px; }
  .login-field label {
    display: block;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .login-field input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid #c5d6ea;
    background: var(--bg-soft);
    color: var(--text);
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }
  .login-field input::placeholder { color: #7a93ad; }
  .login-field input:hover {
    border-color: var(--sky);
    background: #fff;
  }
  .login-field input:focus {
    border-color: var(--navy);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(91, 182, 240, 0.28);
  }
  .login-error,
  .error {
    display: none;
    margin: 0 0 14px;
    padding: 11px 13px;
    border-radius: 10px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: var(--danger);
    font-size: 13px;
    line-height: 1.4;
    font-weight: 700;
  }
  .login-error.show,
  .error.show {
    display: block;
    animation: shake 0.35s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
  .login-submit {
    width: 100%;
    margin-top: 4px;
    padding: 15px 18px;
    border: 0;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.02em;
    background: var(--navy);
    color: #fff;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.18s var(--ease-spring), background 0.18s ease, box-shadow 0.18s ease;
    box-shadow: 0 10px 24px rgba(11, 61, 130, 0.22);
  }
  .login-submit:hover:not(:disabled) {
    transform: translateY(-2px);
    background: var(--primary-strong);
    box-shadow: 0 14px 28px rgba(11, 61, 130, 0.28);
  }
  .login-submit:active:not(:disabled) {
    transform: translateY(0) scale(0.98);
  }
  .login-footnote,
  .help {
    margin: 22px 0 0;
    font-size: 12px;
    color: #7a93ad;
    line-height: 1.5;
  }

  /* —— Chooser —— */
  .chooser {
    min-height: 100vh;
    padding: clamp(24px, 4vw, 48px);
    background:
      radial-gradient(ellipse 50% 40% at 0% 0%, rgba(91, 182, 240, 0.16), transparent 55%),
      radial-gradient(ellipse 45% 35% at 100% 100%, rgba(11, 61, 130, 0.08), transparent 50%),
      linear-gradient(180deg, #ffffff 0%, #f5f9fd 100%);
  }
  .chooser-inner {
    width: min(920px, 100%);
    margin: 0 auto;
  }
  .chooser-brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: clamp(28px, 4vw, 44px);
    animation: brandIn 0.6s var(--ease-spring) both;
  }
  .chooser-logo {
    width: 52px;
    height: 52px;
    flex-shrink: 0;
  }
  .chooser-logo svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .chooser-brand-text {
    min-width: 0;
    flex: 1;
  }
  .chooser-brand-text strong {
    display: block;
    font-family: var(--font-display);
    font-size: clamp(22px, 2.5vw, 28px);
    letter-spacing: 0.06em;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--navy);
    line-height: 1.1;
  }
  .chooser-brand-text span {
    display: block;
    margin-top: 4px;
    font-size: 13px;
    color: var(--muted);
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 28px;
    animation: brandIn 0.6s var(--ease-spring) 0.08s both;
  }
  .topbar h1 {
    margin: 0;
    font-family: var(--font-display);
    font-size: clamp(24px, 3vw, 32px);
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1.15;
  }
  .topbar p {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 15px;
  }
  .signout, .back {
    border: 1.5px solid var(--line);
    background: #fff;
    color: var(--navy);
    border-radius: 10px;
    padding: 11px 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s var(--ease-spring);
  }
  .signout:hover, .back:hover {
    background: var(--primary-soft);
    border-color: var(--sky);
    transform: translateY(-1px);
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }
  .choice {
    text-align: left;
    border: 1.5px solid var(--line);
    border-radius: 18px;
    background: #ffffff;
    padding: 28px 26px;
    min-height: 220px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(11, 61, 130, 0.04);
    transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s var(--ease-spring);
    animation: cardIn 0.65s var(--ease-spring) both;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .choice:nth-child(1) { animation-delay: 0.14s; }
  .choice:nth-child(2) { animation-delay: 0.22s; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(22px); }
    to { opacity: 1; transform: none; }
  }
  .choice::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--navy), var(--sky));
    opacity: 0;
    transition: opacity 0.22s ease;
  }
  .choice:hover {
    border-color: #9ec9ef;
    box-shadow: var(--shadow);
    transform: translateY(-4px);
  }
  .choice:hover::after { opacity: 1; }
  .choice:focus-visible {
    outline: 2px solid var(--sky);
    outline-offset: 3px;
  }
  .choice-icon {
    width: 52px;
    height: 52px;
    display: grid;
    place-items: center;
    border-radius: 14px;
    background: linear-gradient(145deg, #e8f3fc, #f0f7fd);
    border: 1px solid #d6e8f7;
    color: var(--navy);
    margin-bottom: 22px;
  }
  .choice-icon svg {
    width: 26px;
    height: 26px;
    display: block;
  }
  .choice h2 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: -0.02em;
    color: var(--navy);
  }
  .choice p {
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 14.5px;
    line-height: 1.55;
    flex: 1;
  }
  .choice-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 20px;
  }
  .role-note {
    display: inline-flex;
    padding: 6px 10px;
    border-radius: 8px;
    background: var(--primary-soft);
    color: var(--navy);
    font-size: 12px;
    font-weight: 750;
  }
  .choice-go {
    font-size: 13px;
    font-weight: 800;
    color: var(--sky);
    letter-spacing: 0.02em;
    transition: transform 0.18s var(--ease-spring), color 0.18s ease;
  }
  .choice:hover .choice-go {
    color: var(--navy);
    transform: translateX(3px);
  }

  /* —— Frame shell —— */
  .frame-shell {
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
    background: #ffffff;
  }
  .frame-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: #ffffff;
  }
  .frame-title {
    min-width: 0;
    font-weight: 800;
    color: var(--navy);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .frame-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    background: #fff;
  }

  @media (prefers-reduced-motion: reduce) {
    .login-brand-mark,
    .login-hero-copy,
    .login-card,
    .chooser-brand,
    .topbar,
    .choice,
    .login-orb { animation: none; }
  }

  @media (max-width: 900px) {
    .login {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      position: relative;
      overflow: auto;
    }
    .login-hero {
      min-height: 38vh;
      padding: 36px 24px 28px;
      justify-content: flex-end;
    }
    .login-brand-mark { width: min(100%, 340px); }
    .login-orb-a { width: 140px; height: 140px; }
    .login-orb-b { display: none; }
    .login-panel {
      border-left: 0;
      border-top: 1px solid var(--line);
      align-items: flex-start;
      padding: 28px 24px 40px;
    }
    .login-card { animation-name: brandIn; }
    .cards { grid-template-columns: 1fr; }
  }

  @media (max-width: 640px) {
    .chooser { padding: 20px 16px 32px; }
    .topbar { align-items: flex-start; flex-direction: column; }
    .topbar h1 { font-size: 24px; }
    .frame-title { font-size: 14px; }
    .frame-bar { align-items: flex-start; flex-direction: column; }
    .choice { min-height: 0; }
  }
</style>

<script>
/* Hide login before first paint when a session/dashboard already exists (iOS refresh). */
(function () {
  try {
    var raw = localStorage.getItem("lm_combined_dashboard_session_v1");
    if (!raw) return;
    var s = JSON.parse(raw);
    if (!s || !s.name || !s.role) return;
    document.documentElement.classList.add("has-session");
    if (s.role === "worker" || s.dashboard === "induction" || s.dashboard === "safety") {
      document.documentElement.classList.add("boot-frame");
    } else {
      document.documentElement.classList.add("boot-chooser");
    }
  } catch (_) {}
})();
</script>
<style>
  html.boot-frame #login,
  html.boot-frame #chooser { display: none !important; }
  html.boot-frame #frame-shell { display: grid !important; }
  html.boot-chooser #login,
  html.boot-chooser #frame-shell { display: none !important; }
  html.boot-chooser #chooser { display: block !important; }
  #frame-shell .frame-loading {
    display: none;
    place-items: center;
    color: #0b3d82;
    font-weight: 700;
    font-size: 15px;
    padding: 48px 20px;
    background: #f8fafc;
  }
  html.boot-frame #frame-shell.is-loading .frame-loading { display: grid; }
  html.boot-frame #frame-shell.is-loading #dashboard-frame { display: none; }
</style>
</head>
<body>

<main id="login" class="login">
  <section class="login-hero" aria-hidden="true">
    <div class="login-orb login-orb-a"></div>
    <div class="login-orb login-orb-b"></div>
    <div class="login-brand-mark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="LONGMOTIVE">
        <rect width="1600" height="900" fill="transparent"/>
        <g transform="translate(260,200)">
          <path d="M0 0 V240 H240 V188 H62 V0 Z" fill="#0B3D82"/>
          <rect x="94" y="54" width="36" height="118" rx="5" fill="#5BB6F0"/>
          <rect x="144" y="30" width="36" height="142" rx="5" fill="#5BB6F0"/>
          <rect x="194" y="68" width="36" height="104" rx="5" fill="#5BB6F0"/>
          <g fill="#0B3D82" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" letter-spacing="6">
            <text x="290" y="118" font-size="100">LONG</text>
            <text x="290" y="228" font-size="100">MOTIVE</text>
          </g>
        </g>
      </svg>
    </div>
    <div class="login-hero-copy">
      <p>Induction and Safety Store dashboards — one place to manage workforce onboarding and safety inventory.</p>
    </div>
  </section>

  <section class="login-panel">
    <div class="login-card" aria-labelledby="login-title">
      <p class="login-card-kicker">Sign in</p>
      <h1 id="login-title">Welcome back</h1>
      <p class="login-sub">Enter your username to continue.</p>

      <form id="login-form" autocomplete="off">
        <div class="login-field">
          <label for="username">Username</label>
          <input id="username" name="username" placeholder="Enter your username" required autofocus />
        </div>
        <p id="login-error" class="login-error error" role="alert" aria-live="assertive"></p>
        <button class="login-submit" type="submit">Continue</button>
      </form>

    </div>
  </section>
</main>

<main id="chooser" class="chooser hidden">
  <div class="chooser-inner">
    <div class="chooser-brand">
      <div class="chooser-logo" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="LONGMOTIVE mark">
          <path d="M8 8 V92 H92 V72 H28 V8 Z" fill="#0B3D82"/>
          <rect x="40" y="28" width="14" height="40" rx="2.5" fill="#5BB6F0"/>
          <rect x="58" y="18" width="14" height="50" rx="2.5" fill="#5BB6F0"/>
          <rect x="76" y="32" width="14" height="36" rx="2.5" fill="#5BB6F0"/>
        </svg>
      </div>
      <div class="chooser-brand-text">
        <strong>LONGMOTIVE</strong>
        <span>Dashboard portal</span>
      </div>
      <button class="signout" id="chooser-signout" type="button">Sign out</button>
    </div>

    <header class="topbar">
      <div>
        <h1 id="welcome-title">Choose dashboard</h1>
        <p id="welcome-subtitle"></p>
      </div>
    </header>

    <div class="cards">
      <button class="choice" type="button" data-dashboard="induction">
        <div class="choice-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 7V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-8a2 2 0 0 1-2-2v-2"/>
            <path d="M15 12H3"/>
            <path d="M7 8l-4 4 4 4"/>
          </svg>
        </div>
        <h2>Induction Dashboard</h2>
        <p>Worker induction command center and today’s schedule.</p>
        <div class="choice-footer">
          <span class="role-note" id="induction-note"></span>
          <span class="choice-go">Open →</span>
        </div>
      </button>
      <button class="choice" type="button" data-dashboard="safety">
        <div class="choice-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3l8 3v6c0 5-3.5 8.5-8 9.5C7.5 20.5 4 17 4 12V6l8-3z"/>
            <path d="M9.5 12.5l1.8 1.8 3.7-3.8"/>
          </svg>
        </div>
        <h2>Safety Store Dashboard</h2>
        <p>Safety store inventory, purchases, and stock controls.</p>
        <div class="choice-footer">
          <span class="role-note" id="safety-note"></span>
          <span class="choice-go">Open →</span>
        </div>
      </button>
    </div>
  </div>
</main>

<main id="frame-shell" class="frame-shell hidden">
  <div class="frame-bar">
    <div class="frame-title" id="frame-title"></div>
    <div class="frame-actions">
      <button class="back" id="back-btn" type="button">Back</button>
      <button class="signout" id="frame-signout" type="button">Sign out</button>
    </div>
  </div>
  <div class="frame-loading" id="frame-loading" aria-live="polite">Loading dashboard…</div>
  <iframe id="dashboard-frame" title="Selected dashboard"></iframe>
</main>

  const SESSION_KEY = "lm_combined_dashboard_session_v1";
  const INDUCTION_PRELOAD_KEY = "lm_combined_induction_preload_v1";
  const INDUCTION_CACHE_KEY = "lm_induction_cache_v1";
  const INDUCTION_API_URL = "https://script.google.com/macros/s/AKfycbwyQJz65V7G7MGPqoDQH_30N9DmqrLtchF8Z98SFkUIi5TCMWzv77bkB-pyj-RZIPJ5RQ/exec";
  const INDUCTION_API_KEY = "bdd821cd7f8e4ab4be6eae00aacb8dc3";
  const INDUCTION_CACHE_MAX_AGE_MS = 30 * 60 * 1000;

  const ADMIN_USERS = ["Jet18", "Shamil01"];
  const VISITOR_USERS = ["Camilia01"];
  const WORKER_USERS = ["Aungthu1"];

  let session = null;
  let inductionPreloadPromise = null;

  const els = {
    login: document.getElementById("login"),
    chooser: document.getElementById("chooser"),
    frameShell: document.getElementById("frame-shell"),
    form: document.getElementById("login-form"),
    username: document.getElementById("username"),
    error: document.getElementById("login-error"),
    welcomeTitle: document.getElementById("welcome-title"),
    welcomeSubtitle: document.getElementById("welcome-subtitle"),
    inductionNote: document.getElementById("induction-note"),
    safetyNote: document.getElementById("safety-note"),
    frame: document.getElementById("dashboard-frame"),
    frameTitle: document.getElementById("frame-title"),
    backBtn: document.getElementById("back-btn")
  };

  function decodeHtml(encoded) {
    const binary = atob(encoded);
    const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
    return new TextDecoder().decode(bytes);
  }

  function normalizeName(value) {
    return String(value || "")
      .normalize("NFKC")
      .replace(/[\u200B-\u200D\uFEFF]/g, "")
      .trim()
      .replace(/\s+/g, " ")
      .toLowerCase();
  }

  function listHas(list, name) {
    const normalized = normalizeName(name);
    return list.map(normalizeName).includes(normalized);
  }

  function titleCaseName(value) {
    const cleaned = String(value || "").trim().replace(/\s+/g, " ");
    return cleaned.replace(/\b\w/g, char => char.toUpperCase());
  }

  function resolveRole(name) {
    if (listHas(ADMIN_USERS, name)) return "admin";
    if (listHas(VISITOR_USERS, name)) return "visitor";
    if (listHas(WORKER_USERS, name)) return "worker";
    return null;
  }

  function isKnownUser(name) {
    return resolveRole(name) !== null;
  }

  function saveSession(nextSession) {
    session = nextSession;
    localStorage.setItem(SESSION_KEY, JSON.stringify(nextSession));
  }

  function updateSession(patch) {
    if (!session) return;
    saveSession(Object.assign({}, session, patch));
  }

  function loadSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || !parsed.name || !parsed.role) return null;
      if (resolveRole(parsed.name) !== parsed.role) return null;
      return parsed;
    } catch (_) {
      return null;
    }
  }

  function clearSession() {
    session = null;
    localStorage.removeItem(SESSION_KEY);
    els.frame.removeAttribute("srcdoc");
    els.frame.removeAttribute("src");
    if (window.__dashboardBlobUrl) {
      URL.revokeObjectURL(window.__dashboardBlobUrl);
      window.__dashboardBlobUrl = null;
    }
  }

  function showOnly(view) {
    els.login.classList.toggle("hidden", view !== "login");
    els.chooser.classList.toggle("hidden", view !== "chooser");
    els.frameShell.classList.toggle("hidden", view !== "frame");
  }

  function roleLabel(role) {
    if (role === "admin") return "Admin";
    if (role === "visitor") return "Visitor";
    return "Worker";
  }

  function readInductionPreload() {
    try {
      const raw = localStorage.getItem(INDUCTION_PRELOAD_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || parsed.payload === undefined || !parsed.ts) return null;
      if (Date.now() - parsed.ts > INDUCTION_CACHE_MAX_AGE_MS) return null;
      return parsed;
    } catch (_) {
      return null;
    }
  }

  function writeInductionPreload(payload) {
    const record = { payload: payload, ts: Date.now() };
    try {
      localStorage.setItem(INDUCTION_PRELOAD_KEY, JSON.stringify(record));
    } catch (_) {
      /* ignore quota */
    }
    return record;
  }

  function buildInductionApiUrl() {
    return INDUCTION_API_URL + "?key=" + encodeURIComponent(INDUCTION_API_KEY) + "&_=" + Date.now();
  }

  function preloadInductionData(force) {
    if (session && session.role === "worker") return Promise.resolve(null);
    const existing = readInductionPreload();
    if (!force && existing) return Promise.resolve(existing);
    if (inductionPreloadPromise) return inductionPreloadPromise;

    inductionPreloadPromise = fetch(buildInductionApiUrl(), { cache: "no-store" })
      .then(function (response) {
        if (!response.ok) throw new Error("HTTP " + response.status);
        return response.json();
      })
      .then(function (payload) {
        return writeInductionPreload(payload);
      })
      .catch(function (error) {
        console.warn("Induction preload failed", error);
        return readInductionPreload();
      })
      .finally(function () {
        inductionPreloadPromise = null;
      });

    return inductionPreloadPromise;
  }

  function enterChooser() {
    updateSession({ dashboard: null });
    document.documentElement.classList.remove("boot-frame");
    document.documentElement.classList.add("has-session", "boot-chooser");
    els.frameShell.classList.remove("is-loading");
    els.welcomeTitle.textContent = "Welcome, " + session.name;
    els.welcomeSubtitle.textContent = roleLabel(session.role) + " access";
    els.inductionNote.textContent = session.role === "admin" ? "Edit access" : "View only";
    els.safetyNote.textContent = session.role === "visitor" ? "View only" : "Edit access";
    showOnly("chooser");
    preloadInductionData(false);
  }

  function replaceRequired(source, target, replacement, label) {
    if (!source.includes(target)) {
      throw new Error(label.endsWith("failed") ? label : label + " patch failed");
    }
    return source.replace(target, replacement);
  }

  function formatUserList(list, indent) {
    return "[" + list.map(name => JSON.stringify(name)).join(", ") + "]";
  }

  function syncInductionAccessLists(html) {
    let prepared = replaceRequired(
      html,
      'const ADMIN_USERS = ["jet", "shamil"];',
      "const ADMIN_USERS = " + formatUserList(ADMIN_USERS) + ";",
      "Induction admin list"
    );
    prepared = prepared.replace(
      /const VISITOR_USERS = \[[\s\S]*?\];/,
      "const VISITOR_USERS = " + formatUserList(VISITOR_USERS) + ";"
    );
    if (!prepared.includes("const VISITOR_USERS = " + formatUserList(VISITOR_USERS) + ";")) {
      throw new Error("Induction visitor list patch failed");
    }
    return prepared;
  }

  function bootstrapInduction(html) {
    const prepared = syncInductionAccessLists(html);
    const auth = {
      name: session.name,
      role: session.role === "admin" ? "admin" : "visitor",
      active: true,
      ts: Date.now()
    };
    const preload = readInductionPreload();
    const cacheWrite = preload
      ? "localStorage.setItem(" + JSON.stringify(INDUCTION_CACHE_KEY) + "," + JSON.stringify(JSON.stringify(preload)) + ");"
      : "";
    const injection = '<script>try{localStorage.setItem("lm_induction_auth_v1",' +
      JSON.stringify(JSON.stringify(auth)) +
      ');' + cacheWrite +
      'document.documentElement.classList.add("authed");}catch(_){}</scr' + 'ipt>';
    return replaceRequired(prepared, "<head>", "<head>" + injection, "Induction auth");
  }

function bootstrapSafety(html) {
    const canEdit = session.role === "admin" || session.role === "worker";
    const patched = replaceRequired(
      replaceRequired(
        html,
        "const isViewOnly=new URLSearchParams(window.location.search).get('mode')==='boss';",
        "const isViewOnly=" + (canEdit ? "false" : "true") + ";",
        "Safety dashboard patch failed"
      ),
      "let manageMode=false;",
      "let manageMode=" + (canEdit ? "true" : "false") + ";",
      "Safety dashboard patch failed"
    );

    let withoutLibs = patched
      .replace(/<script src="\/lib\/sync-behavior\.js"><\/script>\s*/g, "")
      .replace(/<script src="\/lib\/display-name\.js"><\/script>\s*/g, "");

    withoutLibs = withoutLibs.replace(
      "setSyncUi('🟢 已同步 Synced','sync-status synced');",
      "setSyncUi(window.__LM_SAFETY_REMOTE_OK===false?'🟠 本地同步 Local only (Neon/Vercel offline)':'🟢 已同步 Synced', window.__LM_SAFETY_REMOTE_OK===false?'sync-status offline':'sync-status synced');"
    );

    const fallbackLibs = '<script>' +
      'window.COMBINED_DASHBOARD_USER=' + JSON.stringify(session) + ';' +
      'window.__LM_SAFETY_REMOTE_OK=null;' +
      'window.InventorySync={' +
      'isInventoryPayload:function(d){return !!(d&&typeof d==="object"&&!Array.isArray(d)&&Array.isArray(d.items)&&!d.error);},' +
      'syncFailureMessage:function(res,body){if(res&&res.ok&&!(body&&body.error))return null;if(body&&body.error)return String(body.error);return "HTTP "+((res&&res.status)||"?");},' +
      'mergeLoadedItem:function(item,defaults){var base=(defaults||[]).find(function(x){return x.id===item.id;})||{};return Object.assign({},base,item,{name:(item.name!=null&&item.name!=="")?item.name:base.name,sub:(item.sub!=null)?item.sub:base.sub,unit:(item.unit!=null&&item.unit!=="")?item.unit:base.unit});},' +
      'buildExportPayload:function(state,ts){return {version:2,ts:ts!=null?ts:Date.now(),cats:state.cats,items:state.items,history:(state.history||[]).slice(-50),purchases:(state.purchases||[]).slice(-500),customIcons:state.customIcons||[]};}' +
      '};' +
      'window.InventoryDisplay={' +
      'splitDisplayName:function(name){var parts=String(name||"").split("/");var primary=(parts[0]||"").trim();var secondary=(parts.slice(1).join("/")||"").trim();return {primary:primary,secondary:secondary,main:primary,zh:secondary};}' +
      '};' +
      '(function(){' +
      'var REMOTE=(location.origin&&location.origin.indexOf("http")===0)?(location.origin+"/api/sync"):"https://induction-dahsboard.vercel.app/api/sync";' +
      'var KEY="lm_safety_inventory_sync_v1";' +
      'var origFetch=window.fetch.bind(window);' +
      'function readLocal(){try{var raw=localStorage.getItem(KEY);return raw?JSON.parse(raw):null;}catch(e){return null;}}' +
      'function writeLocal(data){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}}' +
      'function jsonResponse(body,status){return new Response(JSON.stringify(body),{status:status||200,headers:{"Content-Type":"application/json"}});}' +
      'function isSyncUrl(url){return String(url||"").indexOf("/api/sync")!==-1;}' +
      'window.fetch=function(input,init){' +
      'var url=typeof input==="string"?input:(input&&input.url)||"";' +
      'if(!isSyncUrl(url))return origFetch(input,init);' +
      'var method=String((init&&init.method)||"GET").toUpperCase();' +
      'var remote=REMOTE+(url.indexOf("?")>=0?url.slice(url.indexOf("?")):"");' +
      'return origFetch(remote,init).then(function(res){' +
      'return res.text().then(function(text){' +
      'var body=null;try{body=text?JSON.parse(text):null;}catch(e){body={error:text||("HTTP "+res.status)};}' +
      'if(res.ok&&!(body&&body.error)){' +
      'window.__LM_SAFETY_REMOTE_OK=true;' +
      'if(method==="GET"&&body&&Array.isArray(body.items))writeLocal(body);' +
      'if(method==="POST"&&init&&init.body){try{writeLocal(JSON.parse(init.body));}catch(e){}}' +
      'return jsonResponse(body,200);' +
      '}' +
      'throw new Error((body&&body.error)||("HTTP "+res.status));' +
      '});' +
      '}).catch(function(err){' +
      'window.__LM_SAFETY_REMOTE_OK=false;' +
      'if(method==="GET"){return jsonResponse(readLocal(),200);}' +
      'if(method==="POST"){' +
      'try{var payload=JSON.parse(init&&init.body||"null");if(!payload||!Array.isArray(payload.items))throw new Error("Invalid inventory payload");writeLocal(payload);return jsonResponse({success:true,offline:true,neon:"disconnected"},200);}' +
      'catch(e){return jsonResponse({error:"Local sync failed: "+e.message},500);}' +
      '}' +
      'return jsonResponse({error:String(err&&err.message||err||"Sync failed")},500);' +
      '});' +
      '};' +
      '})();' +
      '</scr' + 'ipt>';

    return replaceRequired(withoutLibs, "<head>", "<head>" + fallbackLibs, "Safety bootstrap");
  }

async function openDashboard(kind) {
    if (!session) return;
    if (session.role === "worker" && kind !== "safety") kind = "safety";

    // Show frame shell immediately so iOS refresh never flashes the login page.
    document.documentElement.classList.add("boot-frame", "has-session");
    document.documentElement.classList.remove("boot-chooser");
    els.frameShell.classList.add("is-loading");
    els.frameTitle.textContent = (kind === "induction" ? "Induction Dashboard" : "Safety Store Dashboard") +
      " - " + session.name + " (" + roleLabel(session.role) + ")";
    els.backBtn.classList.toggle("hidden", session.role === "worker");
    showOnly("frame");
    updateSession({ dashboard: kind });

    try {
      if (kind === "induction") {
        // Use cache if present; only block when we have nothing to show yet.
        if (!readInductionPreload()) {
          await preloadInductionData(false);
        } else {
          preloadInductionData(false);
        }
      }

      const source = decodeHtml(DASHBOARDS[kind]);
      const prepared = kind === "induction" ? bootstrapInduction(source) : bootstrapSafety(source);

      if (window.__dashboardBlobUrl) {
        URL.revokeObjectURL(window.__dashboardBlobUrl);
        window.__dashboardBlobUrl = null;
      }

      if (kind === "safety") {
        els.frame.removeAttribute("srcdoc");
        window.__dashboardBlobUrl = URL.createObjectURL(new Blob([prepared], { type: "text/html" }));
        els.frame.src = window.__dashboardBlobUrl;
      } else {
        els.frame.removeAttribute("src");
        els.frame.srcdoc = prepared;
      }

      els.frameShell.classList.remove("is-loading");
    } catch (error) {
      els.frameShell.classList.remove("is-loading");
      document.documentElement.classList.remove("boot-frame", "boot-chooser", "has-session");
      els.error.textContent = error.message || "Could not open dashboard.";
      els.error.classList.add("show");
      showOnly("login");
    }
  }

function signOut() {
    clearSession();
    document.documentElement.classList.remove("boot-frame", "boot-chooser", "has-session");
    els.frameShell.classList.remove("is-loading");
    showOnly("login");
    els.username.value = "";
    els.username.focus();
  }

  els.form.addEventListener("submit", event => {
    event.preventDefault();
    els.error.classList.remove("show");
    const rawName = els.username.value;
    const normalized = normalizeName(rawName);
    if (!normalized) {
      els.error.textContent = "Please enter a username.";
      els.error.classList.add("show");
      return;
    }
    const role = resolveRole(rawName);
    if (!role) {
      els.error.textContent = "Access denied.";
      els.error.classList.add("show");
      return;
    }
    saveSession({ name: titleCaseName(rawName), role, dashboard: null, ts: Date.now() });
    if (role === "worker") {
      openDashboard("safety");
    } else {
      preloadInductionData(true);
      enterChooser();
    }
  });

  document.querySelectorAll("[data-dashboard]").forEach(button => {
    button.addEventListener("click", () => openDashboard(button.dataset.dashboard));
  });

  document.getElementById("chooser-signout").addEventListener("click", signOut);
  document.getElementById("frame-signout").addEventListener("click", signOut);
  els.backBtn.addEventListener("click", enterChooser);

  session = loadSession();
  if (session) {
    if (session.role === "worker") {
      openDashboard("safety");
    } else if (session.dashboard === "induction" || session.dashboard === "safety") {
      preloadInductionData(false);
      openDashboard(session.dashboard);
    } else {
      enterChooser();
    }
  } else {
    showOnly("login");
  }
</script>
