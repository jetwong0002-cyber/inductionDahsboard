<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="LONGMOTIVE">
  <rect width="1600" height="900" fill="#f4f8fc"/>
  <!-- Soft decorative orbs so the blur/droplet has depth -->
  <circle cx="220" cy="180" r="160" fill="#dbeafe" opacity="0.7"/>
  <circle cx="1380" cy="720" r="220" fill="#bfdbfe" opacity="0.55"/>
  <circle cx="1280" cy="160" r="120" fill="#93c5fd" opacity="0.28"/>

  <!-- Centered logo lockup -->
  <g transform="translate(430,270)">
    <g>
      <path d="M0 0 V180 H180 V144 H48 V0 Z" fill="#0B3D82"/>
      <rect x="70" y="42" width="28" height="88" rx="4" fill="#5BB6F0"/>
      <rect x="108" y="24" width="28" height="106" rx="4" fill="#5BB6F0"/>
      <rect x="146" y="52" width="28" height="78" rx="4" fill="#5BB6F0"/>
    </g>
    <g fill="#0B3D82" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" letter-spacing="4">
      <text x="220" y="88" font-size="78">LONG</text>
      <text x="220" y="168" font-size="78">MOTIVE</text>
    </g>
  </g>
</svg>
